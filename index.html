<!DOCTYPE html> 
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東横線 運用・編成一覧</title>
  <style>
    :root {
      --toyoko: #DA0442;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #475569;
      --border-color: #cbd5e1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 16px;
      color: var(--text-main);
      line-height: 1.5;
    }

    main {
      max-width: 650px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .version-tag {
      font-size: 11px;
      color: var(--text-sub);
      font-weight: 700;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0 4px;
      gap: 8px;
    }

    .timestamp { 
      font-size: 12px; 
      color: var(--text-sub); 
      font-weight: 600; 
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .date-input {
      font-size: 13px;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      min-height: 36px;
      box-sizing: border-box;
    }
    
    .refresh-btn {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: background-color 0.2s, border-color 0.2s;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    @media (hover: hover) {
      .refresh-btn:hover {
        background: #f8fafc;
        border-color: #94a3b8;
      }
    }
    .refresh-btn:active {
      background: #e2e8f0;
    }

    .today-back-btn {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--toyoko);
      background: var(--toyoko);
      color: #ffffff;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: opacity 0.2s;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    @media (hover: hover) {
      .today-back-btn:hover {
        opacity: 0.9;
      }
    }
    .today-back-btn:active {
      opacity: 0.8;
    }

    .search-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .search-input {
      width: 100%;
      box-sizing: border-box;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
      min-height: 44px;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--toyoko);
      box-shadow: 0 0 0 3px rgba(218, 4, 66, 0.15);
    }

    .table-container {
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    th, td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #f8fafc;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      user-select: none;
      position: relative;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    @media (hover: hover) {
      th:hover { background-color: #f1f5f9; }
    }
    th.sort-asc::after { content: " ▴"; color: var(--toyoko); font-size: 12px; }
    th.sort-desc::after { content: " ▾"; color: var(--toyoko); font-size: 12px; }

    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background-color: #f8fafc; }
    
    @media (hover: hover) {
      tr:hover { background-color: #f1f5f9; }
    }

    td b {
      font-size: 15px;
      font-weight: 700;
    }

    .yosoku-val {
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
    }

    .changed-form {
      color: var(--toyoko);
      font-weight: 700;
    }

    .no-data { padding: 40px 16px; text-align: center; color: var(--text-sub); font-size: 14px; }
    
    .error-notice {
      margin: 10px 4px;
      padding: 10px;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<main>
  <header>
    <h1 id="mainTitle" style="color: var(--toyoko);">東横線 運用・編成一覧</h1>
    <div class="version-tag">v1.9.3</div>
  </header>

  <div id="errorDisplay" class="error-notice" style="display: none;"></div>

  <section id="toyokoPanel" class="line-panel panel-toyoko">
    <div class="top-bar">
      <div class="timestamp" id="toyokoTimestamp"></div>
      <div class="control-group">
        <input type="date" id="archiveDate" class="date-input" aria-label="日付選択">
        <button class="refresh-btn" id="refreshToyoko">更新</button>
        <button class="today-back-btn" id="backToToday" style="display: none;">今日に戻る</button>
      </div>
    </div>

    <div class="search-container">
      <input type="search" id="searchOp" class="search-input" placeholder="運番検索 (例: 01K)" aria-label="運用番号の検索">
      <input type="search" id="searchForm" class="search-input" placeholder="編成検索 (例: 4101)" aria-label="編成 of 検索">
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 30%;" data-sort="op">運用</th>
            <th style="width: 40%;" data-sort="form">編成</th>
            <th style="width: 30%;" id="yosokuHeaderTitle">明日 ➔ 翌々日</th>
          </tr>
        </thead>
        <tbody id="toyokoTableBody"></tbody>
      </table>
      <div id="toyokoNoData" class="no-data" style="display:none;">データがありません。</div>
    </div>
  </section>
</main>

<script>
  let rawUnyoData = {};
  let rawYosokuData = {};
  let sortState = { toyoko: { key: "op", asc: true } };
  let autoRefreshInterval = null;

  const todayStr = new Date().toLocaleDateString('sv-SE');
  const archiveDateInput = document.getElementById("archiveDate");
  const backToTodayBtn = document.getElementById("backToToday");

  if(archiveDateInput) {
    archiveDateInput.value = todayStr;
    // アーカイブ開始日（2026-06-19）以降を選択可能にする
    archiveDateInput.min = "2026-06-19";
    // 未来の日付は選択不可に制限
    archiveDateInput.max = todayStr;
  }

  function getYosokuKey(offset = 1, baseDate = new Date()) {
    const d = new Date(baseDate.getTime());
    d.setDate(d.getDate() + (offset - 1)); 
    const day = d.getDay(); 
    if (day === 5) return "friday";   
    if (day === 6) return "saturday"; 
    if (day === 0) return "sunday";   
    return "weekday";                 
  }

  window.callback = function(data) {
    rawYosokuData = data;
  };

  async function loadData() {
    const errDiv = document.getElementById("errorDisplay");
    const refreshBtn = document.getElementById("refreshToyoko");
    const yosokuHeader = document.getElementById("yosokuHeaderTitle");
    const selectedDate = archiveDateInput ? archiveDateInput.value : todayStr;
    
    try {
      if(errDiv) errDiv.style.display = "none";
      const cacheBuster = `?_=${Date.now()}`;

      if (selectedDate === todayStr) {
        if(refreshBtn) refreshBtn.style.display = "inline-flex";
        if(backToTodayBtn) backToTodayBtn.style.display = "none";
        if(yosokuHeader) yosokuHeader.textContent = "明日 ➔ 翌々日";

        const resUnyo = await fetch("./today_unyo.json" + cacheBuster, {cache:"no-store"});
        if(!resUnyo.ok) throw new Error("本日の運用ファイル(today_unyo.json)が読み込めません。");
        rawUnyoData = await resUnyo.json();

        await new Promise((resolve, reject) => {
          const oldScript = document.getElementById("yosokuScript");
          if(oldScript) oldScript.remove();

          const script = document.createElement("script");
          script.id = "yosokuScript";
          script.charset = "UTF-8";
          script.src = "https://nfhanyo.web.fc2.com/tokyu/tyunyoyosoku.js" + cacheBuster;
          
          script.onload = () => resolve();
          script.onerror = () => {
            rawYosokuData = {};
            reject(new Error("予測データの通信に失敗しました(404またはネットワークエラー)"));
          };
          document.body.appendChild(script);
        });

        const tsText = `本日分データ (${rawUnyoData.lastUpdate || ""} 時点)`;
        document.getElementById("toyokoTimestamp").textContent = tsText;

        startTimer();

      } else {
        if(refreshBtn) refreshBtn.style.display = "none";
        if(backToTodayBtn) backToTodayBtn.style.display = "inline-flex";
        if(yosokuHeader) yosokuHeader.textContent = "予測データ";
        stopTimer();

        const resArchive = await fetch(`./archive/${selectedDate}.json` + cacheBuster, {cache:"no-store"});
        if(!resArchive.ok) throw new Error(`${selectedDate} のアーカイブデータが見つかりません。`);
        rawUnyoData = await resArchive.json();
        rawYosokuData = {}; 

        document.getElementById("toyokoTimestamp").textContent = `${selectedDate} の実績データ`;
      }

      renderTable("toyoko");
    } catch(e) {
      renderTable("toyoko");
      if(errDiv) {
        errDiv.textContent = `【警告】${e.message}`;
        errDiv.style.display = "block";
      }
    }
  }

  function renderTable(line) {
    const tbody = document.getElementById(`${line}TableBody`);
    const noData = document.getElementById(`${line}NoData`);
    if (!tbody) return;
    tbody.innerHTML = "";

    let list = Array.isArray(rawUnyoData[line]) ? [...rawUnyoData[line]] : [];

    list = list.filter(t => {
      const noStr = t.no ? String(t.no) : "";
      if (noStr.length > 0) {
        const firstChar = noStr.charAt(0);
        if (["2", "3", "4", "5", "6"].includes(firstChar)) return false;
      }
      return true;
    });

    const opFormMap = {};
    list.forEach(t => {
      const op = t.op || "";
      const form = t.form || "";
      if (!opFormMap[op]) opFormMap[op] = new Set();
      opFormMap[op].add(form);
    });

    list = list.filter(t => {
      const op = t.op || "";
      const form = t.form || "";
      const allFormsForOp = opFormMap[op];
      if (form === "-" && allFormsForOp.size > 1) {
        const hasValidForm = Array.from(allFormsForOp).some(f => f !== "-");
        if (hasValidForm) return false;
      }
      return true;
    });

    const selectedDate = archiveDateInput ? archiveDateInput.value : todayStr;
    const baseDate = new Date(selectedDate);

    const tomorrowKey = getYosokuKey(1, baseDate);
    const dayAfterTomorrowKey = getYosokuKey(2, baseDate);
    
    const yosokuTomorrowBlock = rawYosokuData[tomorrowKey] || {};
    const yosokuDayAfterBlock = rawYosokuData[dayAfterTomorrowKey] || {};

    list = list.map(t => {
      const op = (t.op || "").toUpperCase();
      
      if (selectedDate !== todayStr && t.yosoku) {
        return t;
      }

      const predTomorrow = yosokuTomorrowBlock[op];
      let tomorrowArray = [];
      let tomorrowText = "-";

      if (predTomorrow) {
        tomorrowArray = Array.isArray(predTomorrow) ? predTomorrow : [predTomorrow];
        tomorrowText = tomorrowArray.join(" / ");
      }

      let dayAfterText = "-";
      if (tomorrowArray.length > 0) {
        let dayAfterArray = [];
        
        tomorrowArray.forEach(tomOp => {
          const tomOpUpper = tomOp.trim().toUpperCase();
          if (tomOpUpper === "元検") return;

          const predDayAfter = yosokuDayAfterBlock[tomOpUpper];
          if (predDayAfter) {
            if (Array.isArray(predDayAfter)) {
              dayAfterArray.push(...predDayAfter);
            } else {
              dayAfterArray.push(predDayAfter);
            }
          }
        });

        if (dayAfterArray.length > 0) {
          dayAfterText = Array.from(new Set(dayAfterArray)).join(" / ");
        }
      }

      const combinedYosoku = `${tomorrowText}➔${dayAfterText}`;
      return { ...t, yosoku: combinedYosoku };
    });

    const queryOp = document.getElementById("searchOp") ? document.getElementById("searchOp").value.trim().toLowerCase() : "";
    const queryForm = document.getElementById("searchForm") ? document.getElementById("searchForm").value.trim().toLowerCase() : "";

    if (queryOp) {
      list = list.filter(t => (t.op || "").toLowerCase().includes(queryOp));
    }
    if (queryForm) {
      list = list.filter(t => (t.form || "").toLowerCase().includes(queryForm));
    }

    if(list.length === 0) {
      if(noData) noData.style.display = "block";
      return;
    }
    if(noData) noData.style.display = "none";

    const state = sortState[line];
    const alphaOrder = ["K", "S", "M", "T", "G"];

    list.sort((a, b) => {
      let valA = a[state.key] !== undefined ? String(a[state.key]) : "";
      let valB = b[state.key] !== undefined ? String(b[state.key]) : "";

      if (state.key === "op") {
        const matchA = valA.match(/^(\d+)([a-zA-Z]*)$/);
        const matchB = valB.match(/^(\d+)([a-zA-Z]*)$/);
        if (matchA && matchB) {
          const numA = parseInt(matchA[1], 10);
          const alphaA = matchA[2].toUpperCase();
          const numB = parseInt(matchB[1], 10);
          const alphaB = matchB[2].toUpperCase();
          let idxA = alphaA ? alphaOrder.indexOf(alphaA) : 998;
          let idxB = alphaB ? alphaOrder.indexOf(alphaB) : 998;
          if (idxA === -1) idxA = 999;
          if (idxB === -1) idxB = 999;
          if (idxA !== idxB) return state.asc ? idxA - idxB : idxB - idxA;
          return state.asc ? numA - numB : numB - numA;
        }
      }
      const numA = parseFloat(valA);
      const numB = parseFloat(valB);
      if (!isNaN(numA) && !isNaN(numB)) {
        return state.asc ? numA - numB : numB - numA;
      } else {
        return state.asc ? valA.localeCompare(valB, undefined, {numeric: true}) : valB.localeCompare(valA, undefined, {numeric: true});
      }
    });

    const opRenderedCount = {};

    list.forEach(t => {
      const opKey = (t.op || "").toUpperCase();
      
      if (opRenderedCount[opKey] === undefined) {
        opRenderedCount[opKey] = 0;
      } else {
        opRenderedCount[opKey]++;
      }

      const isChanged = opRenderedCount[opKey] > 0;
      const formClass = isChanged ? ' class="changed-form"' : '';

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${t.op}</b></td>
        <td${formClass}>${t.form}</td>
        <td class="yosoku-val">${t.yosoku || "-"}</td>
      `;
      tbody.appendChild(tr);
    });

    updateHeaderUI(line);
  }

  function updateHeaderUI(line) {
    const thElements = document.querySelectorAll(`#${line}Panel th[data-sort]`);
    const state = sortState[line];
    thElements.forEach(th => {
      th.classList.remove("sort-asc", "sort-desc");
      if(th.getAttribute("data-sort") === state.key) {
        th.classList.add(state.asc ? "sort-asc" : "sort-desc");
      }
    });
  }

  function startTimer() {
    if (!autoRefreshInterval) {
      autoRefreshInterval = setInterval(loadData, 10000);
    }
  }

  function stopTimer() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }
  }

  document.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const section = th.closest("section");
      if(!section) return;
      const line = section.id.replace("Panel", "");
      const sortKey = th.getAttribute("data-sort");
      if(sortState[line].key === sortKey) {
        sortState[line].asc = !sortState[line].asc;
      } else {
        sortState[line].key = sortKey;
        sortState[line].asc = true;
      }
      renderTable(line);
    });
  });

  const searchOp = document.getElementById("searchOp");
  const searchForm = document.getElementById("searchForm");
  if (searchOp) searchOp.addEventListener("input", () => renderTable("toyoko"));
  if (searchForm) searchForm.addEventListener("input", () => renderTable("toyoko"));

  if (archiveDateInput) {
    archiveDateInput.addEventListener("change", loadData);
  }

  if (backToTodayBtn) {
    backToTodayBtn.addEventListener("click", () => {
      if (archiveDateInput) {
        archiveDateInput.value = todayStr;
        loadData();
      }
    });
  }

  const refreshToyoko = document.getElementById("refreshToyoko");
  if(refreshToyoko) refreshToyoko.onclick = loadData;

  loadData();
</script>
</body>
</html>
