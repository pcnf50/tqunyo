<!DOCTYPE html> 
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東横線 運用・編成一覧</title>
  <style>
    :root {
      --toyoko: #DA0442;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 12px;
      color: var(--text-main);
    }

    main {
      max-width: 500px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.025em;
    }

    .version-tag {
      font-size: 10px;
      color: var(--text-sub);
      font-weight: 700;
      background: #e2e8f0;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .timestamp { 
      font-size: 11px; 
      color: var(--text-sub); 
      font-weight: 600; 
    }
    
    .refresh-btn {
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: background 0.2s;
    }
    .refresh-btn:active {
      background: #f1f5f9;
    }

    .table-container {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #f8fafc;
      font-weight: 700;
      color: var(--text-sub);
      cursor: pointer;
      user-select: none;
      position: relative;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    th:hover { background-color: #f1f5f9; }
    th.sort-asc::after { content: " ▴"; color: var(--toyoko); font-size: 11px; }
    th.sort-desc::after { content: " ▾"; color: var(--toyoko); font-size: 11px; }

    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #f8fafc; }

    td b {
      font-size: 14px;
      font-weight: 700;
    }

    .no-data { padding: 32px; text-align: center; color: var(--text-sub); font-size: 13px; }
  </style>
</head>
<body>

<main>
  <header>
    <h1 id="mainTitle" style="color: var(--toyoko);">東横線 運用・編成一覧</h1>
    <div class="version-tag">v1.3.4</div>
  </header>

  <section id="toyokoPanel" class="line-panel panel-toyoko">
    <div class="top-bar">
      <div class="timestamp" id="toyokoTimestamp"></div>
      <button class="refresh-btn" id="refreshToyoko">更新</button>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 40%;" data-sort="op">運用</th>
            <th style="width: 60%;" data-sort="form">編成</th>
          </tr>
        </thead>
        <tbody id="toyokoTableBody"></tbody>
      </table>
      <div id="toyokoNoData" class="no-data" style="display:none;">データがありません。</div>
    </div>
  </section>
</main>

<script>
  let rawUnyoData = {};
  let sortState = {
    toyoko: { key: "op", asc: true }
  };

  async function loadUnyoData() {
    try {
      // ★キャッシュ対策: URLの末尾に現在のタイムスタンプ（?_=[数字]）を強制付与してキャッシュを完全に回避
      const cacheBuster = `?_=${Date.now()}`;
      const res = await fetch("./today_unyo.json" + cacheBuster, {cache:"no-store"});
      if(!res.ok) throw new Error("No data file");
      rawUnyoData = await res.json();

      renderTable("toyoko");

      const tsText = `本日分データ (${rawUnyoData.lastUpdate || ""} 時点)`;
      document.getElementById("toyokoTimestamp").textContent = tsText;
    } catch(e) {
      document.getElementById("toyokoNoData").style.display = "block";
    }
  }

  function renderTable(line) {
    const tbody = document.getElementById(`${line}TableBody`);
    const noData = document.getElementById(`${line}NoData`);
    if (!tbody) return;
    tbody.innerHTML = "";

    let list = Array.isArray(rawUnyoData[line]) ? [...rawUnyoData[line]] : [];

    // 1. noの完全に1文字目だけを判定して2,3,4,5,6を除外
    list = list.filter(t => {
      const noStr = t.no ? String(t.no) : "";
      if (noStr.length > 0) {
        const firstChar = noStr.charAt(0);
        if (["2", "3", "4", "5", "6"].includes(firstChar)) {
          return false;
        }
      }
      return true;
    });

    // 2. 同じ運番内で「編成情報があるもの」と「ないもの(-设计)」が重複した時、ないものを除外
    const opFormMap = {};
    list.forEach(t => {
      const op = t.op || "";
      const form = t.form || "";
      if (!opFormMap[op]) {
        opFormMap[op] = new Set();
      }
      opFormMap[op].add(form);
    });

    list = list.filter(t => {
      const op = t.op || "";
      const form = t.form || "";
      const allFormsForOp = opFormMap[op];

      if (form === "-" && allFormsForOp.size > 1) {
        const hasValidForm = Array.from(allFormsForOp).some(f => f !== "-");
        if (hasValidForm) {
          return false;
        }
      }
      return true;
    });

    if(list.length === 0) {
      if(noData) noData.style.display = "block";
      return;
    }
    if(noData) noData.style.display = "none";

    const state = sortState[line];
    const alphaOrder = ["K", "S", "M", "T", "G"];

    list.sort((a, b) => {
      let valA = a[state.key] !== undefined ? String(a[state.key]) : "";
      let valB = b[state.key] !== undefined ? String(b[state.key]) : "";

      if (state.key === "op") {
        const matchA = valA.match(/^(\d+)([a-zA-Z]*)$/);
        const matchB = valB.match(/^(\d+)([a-zA-Z]*)$/);

        if (matchA && matchB) {
          const numA = parseInt(matchA[1], 10);
          const alphaA = matchA[2].toUpperCase();
          const numB = parseInt(matchB[1], 10);
          const alphaB = matchB[2].toUpperCase();

          let idxA = alphaA ? alphaOrder.indexOf(alphaA) : 998;
          let idxB = alphaB ? alphaOrder.indexOf(alphaB) : 998;
          
          if (idxA === -1) idxA = 999;
          if (idxB === -1) idxB = 999;

          if (idxA !== idxB) {
            return state.asc ? idxA - idxB : idxB - idxA;
          }
          
          return state.asc ? numA - numB : numB - numA;
        }
      }

      const numA = parseFloat(valA);
      const numB = parseFloat(valB);
      if (!isNaN(numA) && !isNaN(numB)) {
        return state.asc ? numA - numB : numB - numA;
      } else {
        return state.asc ? valA.localeCompare(valB, undefined, {numeric: true}) : valB.localeCompare(valA, undefined, {numeric: true});
      }
    });

    list.forEach(t => {
      const tr = document.createElement("tr");
      
      tr.innerHTML = `
        <td><b>${t.op}</b></td>
        <td>${t.form}</td>
      `;
      tbody.appendChild(tr);
    });

    updateHeaderUI(line);
  }

  function updateHeaderUI(line) {
    const thElements = document.querySelectorAll(`#${line}Panel th[data-sort]`);
    const state = sortState[line];
    thElements.forEach(th => {
      th.classList.remove("sort-asc", "sort-desc");
      if(th.getAttribute("data-sort") === state.key) {
        th.classList.add(state.asc ? "sort-asc" : "sort-desc");
      }
    });
  }

  document.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const section = th.closest("section");
      if(!section) return;
      const line = section.id.replace("Panel", "");
      const sortKey = th.getAttribute("data-sort");
      
      if(sortState[line].key === sortKey) {
        sortState[line].asc = !sortState[line].asc;
      } else {
        sortState[line].key = sortKey;
        sortState[line].asc = true;
      }
      renderTable(line);
    });
  });

  const refreshToyoko = document.getElementById("refreshToyoko");
  if(refreshToyoko) refreshToyoko.onclick = loadUnyoData;

  loadUnyoData();
  setInterval(loadUnyoData, 10000);
</script>
</body>
</html>
